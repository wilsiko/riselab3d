<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RiseLab3D - Em Breve</title>
  <style>
    /* Reset básico */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      background-color: #111; /* fundo escuro minimalista */
      color: #fff;
    }

    .container {
      max-width: 500px;
      padding: 20px;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 20px;
      color: #00fff7; /* destaque minimalista */
      font-weight: 700;
    }

    p {
      font-size: 1.1rem;
      margin-bottom: 25px;
      color: #ccc;
      line-height: 1.5;
    }

    a.instagram {
      display: inline-block;
      text-decoration: none;
      color: #111;
      background: #00fff7;
      padding: 10px 25px;
      border-radius: 50px;
      font-weight: bold;
      font-size: 1rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>RiseLab3D</h1>
    <p>Estamos preparando algo incrível em 3D.<br>
       Fique de olho e acompanhe nosso Instagram!</p>
    <a href="https://instagram.com/riselab3d" class="instagram" target="_blank">@riselab3d</a>
  </div>
</body>
</html>
